services:
  postgres:
    image: postgres:17-alpine
    container_name: plux_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-plux_db}
      POSTGRES_USER:     ${POSTGRES_USER:-plux_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plux_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plux_user} -d ${POSTGRES_DB:-plux_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plux_backend
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - POSTGRES_DB=${POSTGRES_DB:-plux_db}
      - POSTGRES_USER=${POSTGRES_USER:-plux_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-plux_password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-please}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,0.0.0.0
      - DEBUG=True
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plux_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      # node_modules stays an anonymous volume so the host's (Windows) install
      # never shadows the container's (alpine) native modules.
      - /app/node_modules
      # .next is NOT an anonymous volume: keeping it on the bind mount means the
      # dev build cache clears together with the host and can't go stale across
      # dependency changes. Do not run `npm run dev` on the host while the
      # container runs — both would write the same ./frontend/.next.
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_venv:
